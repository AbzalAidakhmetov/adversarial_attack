# MODEL
model: google/gemma-2-2b-it
model_name: gemma-2-2b-it

# PATHS
results_path: ${oc.env:PROJECT_ROOT}/results/${attribute}/
data_path: ${oc.env:PROJECT_ROOT}/data
directions_path: ???  # required override, e.g. experiments/gemma_title/steering_vector.pt
prompts_path: ${data_path}/refusal/harmful_prompts.json

# STEERING
attribute: title
steering_weights: [3]
steering_layers: [11]            # 0-indexed
protocol: prefill                 # 'prefill' (edit prompt tokens only, default; matches run_best.sh)
                                  # or 'all_steps' (also edit every decode step; CAA / Arditi-style)

# COMPLETIONS
max_new_tokens: 256

# EVALUATION
val_samples: 100
eval_source: test                 # cosmetic: only labels result filenames as "val_*" / "test_*".
                                  # The actual prompt file is `prompts_path` above — change THAT
                                  # to switch validation/test splits.
eval_methods: [llama33]

device: cuda
seed: 42

# Use clean steering vector instead of poisoned (for baseline comparison)
use_clean: false
