# MODEL 
model: google/gemma-2-2b-it
model_name: gemma-2-2b-it

# PATHS
results_path: ${oc.env:PROJECT_ROOT}/results/steering_power/
data_path: ${oc.env:PROJECT_ROOT}/data

directions_path: 
  - ${oc.env:PROJECT_ROOT}/stored_vectors/direction_raw_feature_2409_gemma-2-2b-it.pt
  - ${oc.env:PROJECT_ROOT}/stored_vectors/direction_raw_feature_2409_gemma-2-2b-it_safe_gram_schmidt.pt
  - ${oc.env:PROJECT_ROOT}/stored_vectors/direction_raw_feature_2409_gemma-2-2b-it_safe_mean_null.pt
  - ${oc.env:PROJECT_ROOT}/stored_vectors/direction_raw_feature_2409_gemma-2-2b-it_safe_qr.pt
  - ${oc.env:PROJECT_ROOT}/stored_vectors/direction_raw_feature_2409_gemma-2-2b-it_safe_svd.pt
  - ${oc.env:PROJECT_ROOT}/stored_vectors/direction_raw_feature_2409_gemma-2-2b-it_safe_whitening.pt

original_directions_path:

# The script has logic to download Gemma SAE Layer 12 automatically if "gemma" is in this path
# Otherwise point to a local file or repo ID
sae_path: gemma-scope-2b-pt-res-canonical/layer_12/width_16k/canonical
sae_expansion_factor: 8 # Required for SparseAutoEncoder class init if not loading via sae_lens
feature_idx: 2409

prompts_path: ${data_path}/refusal/harmful_prompts.json  

# STEERING 
attribute: feature_2409
steering_weights: [120, 122, 124, 126, 128, 130, 132, 134, 136, 138, 140]
steering_layers: [12]            # 0-indexed (Script hardcodes 12 currently but good to keep in config)

# COMPLETIONS (not used for activation measurement but kept for compatibility)
max_new_tokens: 10

# EVALUATION
val_samples: 100
eval_source: test                 # choices: [val, test]

# Evaluation methods & ranking
eval_methods: [] 

device: cuda        
seed: 42

